apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ey-cart-route
  namespace: kgateway-ns
spec:
  parentRefs:
    - name: mahesh-kgateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /eycart
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: eycart-svc
          port: 3001
---
